<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Gradient Form</title>

<style>
    body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #6C63FF, #4FD3C4, #FF8E9E);
        background-size: 300% 300%;
        animation: bgMove 10s infinite;
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    @keyframes bgMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    form {
        width: 420px;
        padding: 30px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        animation: popUp 0.6s ease;
    }

    @keyframes popUp {
        from {transform: translateY(20px); opacity: 0;}
        to {transform: translateY(0); opacity: 1;}
    }

    label {
        font-weight: 600;
        margin-top: 15px;
        display: block;
    }

    input, select, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        border-radius: 10px;
        border: 2px solid #cfcfcf;
        outline: none;
        transition: 0.3s;
        font-size: 15px;
    }

    input:focus, textarea:focus, select:focus {
        border-image: linear-gradient(45deg, #6C63FF, #FF5F6D) 1;
        box-shadow: 0 0 10px rgba(108,99,255,0.4);
    }

    .btn {
        width: 48%;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 15px;
        font-weight: bold;
        transition: 0.3s;
        color: white;
    }

    .submit-btn {
        background: linear-gradient(135deg, #6C63FF, #9A67EA);
    }

    .reset-btn {
        background: linear-gradient(135deg, #FF5F6D, #FFC371);
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    .agree-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
    }

    .agree-row input {
        width: auto;
        transform: scale(1.3);
    }

    .error_message {
        color: #FF3B3B;
        font-size: 13px;
        margin-top: 2px;
        display: block;
    }
</style>
</head>

<body>

<form onsubmit="return FormValidation()">

    <h2>
        Registration Form
    </h2>

    <label>Name:</label>
    <input type="text" id="name">
    <span id="name_error" class="error_message"></span>

    <label>Password:</label>
    <input type="password" id="password">
    <span id="password_error" class="error_message"></span>

    <label>Re-Enter Password:</label>
    <input type="password" id="repassword">
    <span id="repassword_error" class="error_message"></span>

    <label>Email:</label>
    <input type="email" id="email">
    <span id="email_error" class="error_message"></span>

    <label>College (Optional):</label>
    <textarea id="college"></textarea>

    <label>Course:</label>
    <select id="course">
        <option value="">=== Select option ===</option>
        <option>Java Fullstack</option>
        <option>Python Fullstack</option>
        <option>Mern Stack</option>
        <option>Data Science</option>
        <option>Manual Testing</option>
        <option>Data Analytics</option>
    </select>
    <span id="course_error" class="error_message"></span>

    <div class="agree-row">
        <input type="checkbox" id="agree">
        <label for="agree">I Agree</label>
    </div>
    <span id="checkbox_error" class="error_message"></span>

    <div style="display:flex; justify-content:space-between;">
        <button type="submit" class="btn submit-btn">Submit</button>
        <button type="reset" class="btn reset-btn">Reset</button>
    </div>

</form>

<script>
function FormValidation() {

    const name = document.getElementById('name').value;
    const password = document.getElementById('password').value;
    const repassword = document.getElementById('repassword').value;
    const email = document.getElementById('email').value;
     

    const nameError = document.getElementById('name_error');
    const passwordError = document.getElementById('password_error');
    const repasswordError = document.getElementById('repassword_error');
    const emailError = document.getElementById('email_error');
    const courseError = document.getElementById('course_error');
    const checkboxError = document.getElementById('checkbox_error');

    nameError.textContent = "";
    passwordError.textContent = "";
    repasswordError.textContent = "";
    emailError.textContent = "";
    courseError.textContent = "";
    checkboxError.textContent = "";

    let isValid = true;

    if (name === "") {
        nameError.textContent = "Name is required";
        isValid = false;
    }

    if (password === "" || password.length < 6) {
        passwordError.textContent = "Password must be at least 6 characters";
        isValid = false;
    }

    if (repassword === "") {
        repasswordError.textContent = "Re-enter password";
        isValid = false;
    } 
    else if (password !== repassword) {
        repasswordError.textContent = "Passwords do not match";
        isValid = false;
    }

    if (email === "" || !email.includes("@")) {
        emailError.textContent = "Enter a valid email";
        isValid = false;
    }

    if (course === "") {
        courseError.textContent = "Please select a course";
        isValid = false;
    }

    if (!agree) {
        checkboxError.textContent = "You must agree to continue";
        isValid = false;
    }

    return isValid;
}
</script>

</body>
</html>
