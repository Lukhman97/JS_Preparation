<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful CRUD Operation</title>

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg,yellow, #4c9116);
            margin: 0;
            padding: 40px;
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            color: black;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #777;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.8;
        }

        .create-btn {
            background: #28a745;
            color: white;
        }

        .edit-btn {
            background: #ffc107;
            color: black;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        table {
            width: 80%;
            margin: 30px auto;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        th {
            background: #333;
            color: white;
            padding: 12px;
            font-size: 16px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f2f2f2;
        }

    </style>
</head>

<body>

    <h2>Colorful CRUD Operation</h2>

    <form>
        <input type="text" id="name" placeholder="Enter your name">
        <input type="email" id="email" placeholder="Enter your email">
        <button type="button" class="create-btn" onclick="createData()">Create</button>
    </form>

    <table cellpadding="10" border="2">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Field</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        let data = [];
        let editIndex = -1;

        function createData() {
            let name = document.getElementById('name').value;
            let email = document.getElementById('email').value;

            if (editIndex === -1) {
                data.push({ name, email });
            } 
            else {
                data[editIndex].name = name;
                data[editIndex].email = email;
                editIndex = -1;
            }

            displayData();

            document.getElementById('name').value = "";
            document.getElementById('email').value = "";
        }

        function displayData() {
            let tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            data.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.email}</td>
                        <td>
                            <button class="edit-btn" onclick="editData(${index})">Edit</button>
                            <button class="delete-btn" onclick="deleteData(${index})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function editData(index) {
            editIndex = index;
            document.getElementById('name').value = data[index].name;
            document.getElementById('email').value = data[index].email;
        }

        function deleteData(index) {
            data.splice(index, 1);
            displayData();
        }
    </script>

</body>
</html>
