<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Calculator</title>

    <style>
        /* ---------- GENERAL PAGE STYLE ---------- */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        /* ---------- CALCULATOR BOX ---------- */
        .calculator {
            width: 330px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        /* ---------- DISPLAY ---------- */
        #display {
            width: 100%;
            height: 60px;
            font-size: 28px;
            margin-bottom: 20px;
            padding: 15px;
            text-align: right;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border-radius: 12px;
        }

        /* ---------- BUTTON GRID ---------- */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* ---------- BUTTON STYLE ---------- */
        button {
            padding: 18px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            color: white;
            transition: 0.2s ease;
        }

        button:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.35);
        }

        /* ---------- OPERATOR BUTTON ---------- */
        .operator {
            background: rgba(255, 210, 90, 0.8);
            color: black;
        }

        .operator:hover {
            background: rgba(255, 210, 90, 1);
        }

        /* ---------- EQUAL BUTTON ---------- */
        .equal {
            background: #ff5722;
            color: white;
        }

        .equal:hover {
            background: #ff3d00;
        }

        /* ---------- ZERO BUTTON (Wide) ---------- */
        .zero {
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <div class="calculator">

        <!-- Display Screen -->
        <input type="text" id="display" disabled>

        <!-- Buttons -->
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">/</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">*</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button class="zero" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>

    </div>

    <script>

        // SELECT THE DISPLAY BOX
        let display = document.getElementById("display");

        /*
            Add the button value inside the screen.
            Example: appendValue("7") → display shows 7.
        */
        function appendValue(value) {
            display.value += value;
        }

        /*
            Clear the entire display.
        */
        function clearDisplay() {
            display.value = "";
        }

        /*
            Delete the last character.
            Example: "123" → DEL → "12"
        */
        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        /*
            Calculate the entered expression using eval().
            Example: "5+3" → eval() → 8
        */
        function calculate() {
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Error";
            }
        }

    </script>

</body>
</html>
