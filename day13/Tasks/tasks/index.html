    <script>

    let a=[5, 2, 8, 1, 3]
    for(let i=0;i<a.length;i++){
        for(let j=0;j<a.length-i-1;j++){
            if(a[j]>a[j+1]){
                let temp=a[j]
                a[j]=a[j+1]
                a[j+1]=temp
            }
        }
    }
    console.log(a)

    </script>
