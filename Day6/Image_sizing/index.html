<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sizing an Image</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background-color: #f2f2f2;
}

.section {
    background-color: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    width: 400px;
    border: 1px solid #ccc;
}

img {
    width: 250px;
    height: 250px;
    margin: 15px 0;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 8px 15px;
    font-size: 16px;
    border: none;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}

#value {
    background-color: #ddd;
    color: black;
    min-width: 60px;
}

#addcontent {
    height: 20px;
}

#one {
    margin: 10px 0;
}
</style>

</head>

<body>

<div class="section">

    <h2>Sizing an Image</h2>

    <p>
        Click + to increase and - to decrease the image size by 5px.
    </p>

    <div id="addcontent"></div>

    <img src="https://static.vecteezy.com/system/resources/previews/030/696/801/large_2x/dog-image-hd-free-photo.jpg" id="image">

    <div id="one"></div>

    <div class="controls">
        <button onclick="decrease()">-</button>
        <button id="value">300px</button>
        <button onclick="increase()">+</button>
    </div>

</div>

<script>

let size = 300;

let info = document.getElementById("addcontent");
let image = document.getElementById("image");
let one = document.getElementById("one");
let value = document.getElementById("value");

// initial
one.innerText = size + "px";

function increase() {
    if (size >= 700) {
        info.innerText = "Too big! Decrease the size";
        info.style.color = "red";
    } else {
        size += 5;
        info.innerText = "";
    }

    image.style.width = size + "px";
    image.style.height = size + "px";
    value.innerText = size + "px";
    one.innerText = size + "px";
}

function decrease() {
    if (size > 50) {
        size -= 5;
        info.innerText = "";
    }

    image.style.width = size + "px";
    image.style.height = size + "px";
    value.innerText = size + "px";
    one.innerText = size + "px";
}

</script>

</body>
</html>
