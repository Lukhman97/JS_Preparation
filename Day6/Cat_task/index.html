<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Like App</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background-color: #f2f2f2;
}

.section {
    background-color: white;
    padding: 20px;
    text-align: center;
    border: 1px solid #ccc;
}

img {
    width: 250px;
    height: 250px;
}

button {
    width: 150px;
    height: 40px;
    margin-top: 15px;
    border: none;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}

.liked {
    background-color: red;
}
</style>

</head>

<body>

<div class="section">

    <!-- Cat Image -->
    <img src="./cat_crying.png" id="cat" alt="cat">

    <br>

    <!-- Button -->
    <button onclick="toggleLike()" id="btn">LIKE ❤️</button>

</div>

<script>

// Track state
let liked = false;

function toggleLike() {
    let img = document.getElementById("cat");
    let btn = document.getElementById("btn");

    if (!liked) {
        img.src = "./cat_laughing.png";
        btn.innerHTML = "LIKED ❤️";
        btn.classList.add("liked");
        liked = true;
    } else {
        img.src = "./cat_crying.png";
        btn.innerHTML = "LIKE ❤️";
        btn.classList.remove("liked");
        liked = false;
    }
}

</script>

</body>
</html>
