<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Like App</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(135deg, #a1c4fd, #c2ffd8);
}

/* Card */
.section {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Image */
img {
    width: 300px;
    height: 300px;
    border-radius: 15px;
    transition: 0.4s;
}

/* Button */
button {
    width: 200px;
    height: 45px;
    margin-top: 20px;

    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;

    background: linear-gradient(135deg, #6c63ff, #5ee7df);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover */
button:hover {
    transform: scale(1.1);
}

/* Liked style */
.liked {
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
}
</style>

</head>

<body>

<div class="section">

    <!-- Cat Image -->
    <img src="./cat_crying.png" id="cat" alt="cat">

    <br>

    <!-- Button -->
    <button onclick="toggleLike()" id="btn">LIKE ❤️</button>

</div>

<script>

// Track state
let liked = false;

function toggleLike() {
    let img = document.getElementById("cat");
    let btn = document.getElementById("btn");

    if (!liked) {
        img.src = "./cat_laughing.png";
        btn.innerHTML = "LIKED ❤️";
        btn.classList.add("liked");
        liked = true;
    } else {
        img.src = "./cat_crying.png";
        btn.innerHTML = "LIKE ❤️";
        btn.classList.remove("liked");
        liked = false;
    }
}

</script>

</body>
</html>
