<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="products" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:10px"></div>
    <script>
        async function fetchData() {
            let responce=await fetch("https://fakestoreapi.com/products")
            let result=await responce.json()
            let pros=document.getElementById('products')
            pros.innerHTML=" "  
            result.forEach((product)=>{
                pros.innerHTML+=`
                <div style="width:200px; border:1px solid black ;padding:10px; margin:10px">
                    <h1>${product.title}</h1>
                    <img src="${product.image}" style="width:150px"/>
                    <h2>Price  :$ ${product.price}</h2>
                     <h2>${product.category}</h2>
                   <p>${product.description}</p>
                    </div>
                
                `
            })
            
        }
        fetchData()
    </script>
</body>
</html>
