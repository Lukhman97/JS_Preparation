<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd, #c2ffd8);
}

/* Card Design */
.card {
    width: 400px;
    padding: 20px;
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);

    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

/* Image */
img {
    width: 100%;
    height: 220px;
    border-radius: 15px;
    object-fit: cover;
}

/* Title */
h1 {
    text-align: center;
    margin: 15px 0;
    color: #333;
}

/* Labels */
label {
    display: block;
    margin-top: 10px;
    font-weight: 600;
    color: #222;
}

/* Inputs */
input {
    width: 100%;
    height: 40px;
    margin-top: 5px;
    padding: 5px 10px;

    border: none;
    border-radius: 10px;
    outline: none;

    background: rgba(255, 255, 255, 0.8);
    transition: 0.3s;
}

/* Input focus effect */
input:focus {
    background: #fff;
    box-shadow: 0 0 5px #6c63ff;
}

/* Button */
button {
    width: 100%;
    height: 45px;
    margin-top: 20px;

    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;

    background: linear-gradient(135deg, #6c63ff, #5ee7df);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Error text */
#extra {
    color: red;
    margin-top: 10px;
    text-align: center;
    font-weight: 500;
}
</style>
</head>
<body>
    <div class="card">
        <div class="section">
            <img src="https://tse3.mm.bing.net/th/id/OIP.k2G4aD7hSiWRwhAF3kqXfwHaEC?pid=Api&P=0&h=180" alt="caliculator">
            <h1 style="margin-left: 100px; color: hsl(305, 89%, 51%);font-weight: bold;">TIP CALICULATOR</h1>
        </div>
        <div class="sec">
            <label for="">BILL AMOUNT</label> <br>
            <input type="text" placeholder="Enter Bill amount" id="billamount"> <br><br>

            <label for="">PERCENTAGE TIP</label><br>
            <input type="text" placeholder="Enter Tip amount" id="tipamount"> <br><br>

            <label for="">TIP AMOUNT</label> <br>
            <input type="text" placeholder="Enter your bill and wait...." id="display_tip"> <br><br>

            <label for="">TOTAL AMOUNT</label> <br>
            <input type="text" placeholder="Enter your bill and wait...." id="display_total"><br><br>

            <button onclick="getdata()">CALCULATE</button>
            <div id="extra"></div>

            

        </div>



    </div>

    <script>
       function getdata(){
        var amount=document.getElementById("billamount").value;
        if(Number(amount)<=0 && Number(amount)<=100000000000){
            var info=document.getElementById("extra")
            info.innerHTML="<p>Please enter the valid amount</p>"
        }
        console.log(amount)
        var tipamount=document.getElementById("tipamount").value;
        if(Number(tipamount)<=0 && Number(tipamount)<=100000000000){
            var info=document.getElementById("extra")
            info.innerHTML="<p>Please enter the valid amount</p>"
        }
        console.log(tipamount)

        var display_tip=document.getElementById("display_tip").value=tipamount

        var display_total=document.getElementById("display_total").value=Number(amount)+Number(tipamount)
       }
       
    </script>
</body>
</html>
