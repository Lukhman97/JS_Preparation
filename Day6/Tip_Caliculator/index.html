<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f2f2f2;
}

.card {
    width: 350px;
    padding: 20px;
    border-radius: 10px;
    background-color: white;
    border: 1px solid #ccc;
}

img {
    width: 100%;
    height: 200px;
}

h1 {
    text-align: center;
    margin: 10px 0;
}

label {
    display: block;
    margin-top: 10px;
}

input {
    width: 100%;
    height: 35px;
    margin-top: 5px;
    padding: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    height: 40px;
    margin-top: 15px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
}

#extra {
    color: red;
    margin-top: 10px;
    text-align: center;
}
</style>
</head>
<body>
    <div class="card">
        <div class="section">
            <img src="https://tse3.mm.bing.net/th/id/OIP.k2G4aD7hSiWRwhAF3kqXfwHaEC?pid=Api&P=0&h=180" alt="caliculator">
            <h1 style="margin-left: 100px; color: hsl(305, 89%, 51%);font-weight: bold;">TIP CALICULATOR</h1>
        </div>
        <div class="sec">
            <label for="">BILL AMOUNT</label> <br>
            <input type="text" placeholder="Enter Bill amount" id="billamount"> <br><br>

            <label for="">PERCENTAGE TIP</label><br>
            <input type="text" placeholder="Enter Tip amount" id="tipamount"> <br><br>

            <label for="">TIP AMOUNT</label> <br>
            <input type="text" placeholder="Enter your bill and wait...." id="display_tip"> <br><br>

            <label for="">TOTAL AMOUNT</label> <br>
            <input type="text" placeholder="Enter your bill and wait...." id="display_total"><br><br>

            <button onclick="getdata()">CALCULATE</button>
            <div id="extra"></div>

            

        </div>



    </div>

    <script>
       function getdata(){
        var amount=document.getElementById("billamount").value;
        if(Number(amount)<=0 && Number(amount)<=100000000000){
            var info=document.getElementById("extra")
            info.innerHTML="<p>Please enter the valid amount</p>"
        }
        console.log(amount)
        var tipamount=document.getElementById("tipamount").value;
        if(Number(tipamount)<=0 && Number(tipamount)<=100000000000){
            var info=document.getElementById("extra")
            info.innerHTML="<p>Please enter the valid amount</p>"
        }
        console.log(tipamount)

        var display_tip=document.getElementById("display_tip").value=tipamount

        var display_total=document.getElementById("display_total").value=Number(amount)+Number(tipamount)
       }
       
    </script>
</body>
</html>
