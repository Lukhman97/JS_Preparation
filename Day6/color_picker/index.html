<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background-color: #f2f2f2;
}

.section {
    width: 500px;
    padding: 20px;
    background-color: lightblue;
    border: 1px solid #ccc;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.box {
    width: 100px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.box1 { background-color: red; }
.box2 { background-color: blue; }
.box3 { background-color: green; }
.box4 { background-color: yellow; }

h1 {
    text-align: center;
}

.block {
    width: 100%;
    height: 30px;
    background-color: black;
    margin: 10px 0;
    text-align: center;
    color: white;
}

.change2 {
    font-size: 16px;
    text-align: center;
}
</style>

</head>

<body>

<div class="section">
    
    <h1>COLOR PICKER</h1>

    <div class="container">
        <div class="box box1" id="box1">#da0a0a</div>
        <div class="box box2" id="box2">#2e09b7</div>
        <div class="box box3" id="box3">#0eee68</div>
        <div class="box box4" id="box4">#fffb00</div>
    </div>

    <div id="change">
        <div class="block" id="display">Selected Color</div>
    </div>

    <div class="change2">
        Try clicking on one of the colors above to change the background
    </div>

</div>
    <script>
        var red=document.getElementById("box1")
        var blue=document.getElementById("box2")
        var green=document.getElementById("box3")
        var yellow=document.getElementById("box4")
        
        var display=document.getElementById("display")

        red.addEventListener("click", function() {
            document.body.style.backgroundColor = "#da0a0a";
            display.innerText = `BACKGROUND COLOR :#da0a0a`;
        });

        blue.addEventListener("click", function() {
            document.body.style.backgroundColor = "#2e09b7";
            display.innerText = `BACKGROUND COLOR :#2e09b7`;
        });

        green.addEventListener("click", function() {
            document.body.style.backgroundColor = "#0eee68";
            display.innerText = `BACKGROUND COLOR :#0eee68`;
        });

        yellow.addEventListener("click", function() {
            document.body.style.backgroundColor = "#fffb00";
            display.innerText = `BACKGROUND COLOR : #fffb00`;
        });

    </script>
</body>
</html>
