<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light</title>

   <style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
}

.main {
    display: flex;
    justify-content: center;
    margin-top: 30px;
   
}

.buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

button {
    width: 150px;
    height: 40px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}

.lights {
    background-color: black;
    width: 120px;
    height: 300px;
    margin-left: 50px;
    padding-top: 10px;
    border-radius: 30px;
}

.col {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background-color: gray;
    margin: 15px auto;
}
</style>
</head> 
<body>

    <div class="section">
        <h1>🚦 Traffic Light</h1>

        <div class="main">

            <div class="buttons">
                <button onclick="stop()">STOP</button>
                <button onclick="ready()">READY</button>
                <button onclick="go()">GO</button>
            </div>

            <div class="lights">
                <div class="col" id="col1"></div>
                <div class="col" id="col2"></div>
                <div class="col" id="col3"></div>
            </div>

        </div>
    </div>

    <script>
        var col1=document.getElementById("col1")
        var col2=document.getElementById("col2")
        var col3=document.getElementById("col3")

        let status=false
        function stop(){
            if(status){
                status=false
            }
            else{
                col1.style.backgroundColor="red"
                setTimeout(()=>{
                    col1.style.backgroundColor="white"
                },6000)
            }
        }

        function ready(){
            col3.style.backgroundColor="gray"
             col1.style.backgroundColor="gray"
              col2.style.backgroundColor="yellow"
        }

        function go(){
            col3.style.backgroundColor="green"
             col1.style.backgroundColor="gray"
              col2.style.backgroundColor="gray"
        }
    </script>

</body>
</html>
