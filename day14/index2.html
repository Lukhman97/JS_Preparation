<!DOCTYPE html>
<html>
<head>
    <title>Practice</title>
</head>
<body>



<script>

let name = "Lukhman"
const age = 21

console.log(name, age)

const add = (a, b) => a + b
console.log(add(5, 3))

const square = n => n * n
console.log(square(4))

const greet = () => "Hello ES6"
console.log(greet())

const nums = [1,2,3]
const newNums = [...nums, 4,5]
console.log(newNums)

const arr1 = [1,2]
const arr2 = [3,4]
const merged = [...arr1, ...arr2]
console.log(merged)

const person = {
    name: "Ali",
    age: 25,
    city: "Delhi"
}

const {name: n, age: a} = person
console.log(n, a)

const colors = ["red","green","blue"]
const [c1, c2] = colors
console.log(c1, c2)

function sum(x = 1, y = 2) {
    return x + y
}

console.log(sum())
console.log(sum(5, 5))

function total(...numbers) {
    let sum = 0
    for (let num of numbers) {
        sum += num
    }
    return sum
}

console.log(total(1,2,3,4))

const str = "JavaScript"

for (let ch of str) {
    console.log(ch)
}

const numbers = [10,20,30]

for (let num of numbers) {
    console.log(num)
}

const user = {
    name: "Ahmed",
    greet() {
        console.log("Hello " + this.name)
    }
}

user.greet()

const key = "age"
const obj = {
    name: "Sam",
    [key]: 30
}

console.log(obj)

const a1 = [1,2,3]
const doubled = a1.map(x => x * 2)
console.log(doubled)

const evens = a1.filter(x => x % 2 === 0)
console.log(evens)

const totalSum = a1.reduce((acc, val) => acc + val, 0)
console.log(totalSum)

class Person {
    constructor(name, age) {
        this.name = name
        this.age = age
    }

    info() {
        console.log(this.name, this.age)
    }
}

const p1 = new Person("Ali", 22)
p1.info()

class Student extends Person {
    constructor(name, age, course) {
        super(name, age)
        this.course = course
    }

    show() {
        console.log(this.course)
    }
}

const s1 = new Student("Sara", 20, "CS")
s1.info()
s1.show()

const promise = new Promise((resolve, reject) => {
    let success = true
    if (success) {
        resolve("Success")
    } else {
        reject("Error")
    }
})

promise
.then(res => console.log(res))
.catch(err => console.log(err))

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms))
}

async function run() {
    console.log("Start")
    await delay(1000)
    console.log("End")
}

run()

async function fetchData() {
    const res = await fetch("https://jsonplaceholder.typicode.com/todos/1")
    const data = await res.json()
    console.log(data)
}

fetchData()

const set = new Set([1,2,2,3])
set.add(4)
console.log(set)

const map = new Map()
map.set("name", "Ali")
map.set("age", 25)

console.log(map.get("name"))

const str2 = "Hello"
console.log(str2.includes("He"))
console.log(str2.startsWith("H"))
console.log(str2.endsWith("o"))

const num = 5
console.log(Number.isInteger(num))

const pow = 2 ** 3
console.log(pow)

</script>

</body>
