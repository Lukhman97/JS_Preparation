console.log(a * b)
console.log(a / b)

if (age > 18) {

} else {

}

for (var i = 1; i <= 5; i++) {

}

}

console.log(add(3, 4))

} else {

}

console.log(str.toUpperCase())
console.log(str.toLowerCase())

var y = "5"

console.log(x == y)
console.log(x === y)

if (marks >= 90) {

} else if (marks >= 70) {
    console.log("B")
} else {
    console.log("C")
}

function square(n) {
    return n * n
}

console.log(square(6))

for (var i = 0; i < numbers.length; i++) {
    total += numbers[i]
}

console.log(total)

var i = 1
do {
    console.log(i)
    i++
} while (i <= 3)

var text = "Hello"

for (var i = 0; i < text.length; i++) {
    console.log(text[i])
}

var arr = [10,20,30]

arr.push(40)
arr.pop()

console.log(arr)

    if (a > b) return a
    else return b
}

console.log(max(10,20))

    console.log(count)
}

increment()

if (temp > 25) {
    console.log("Hot")
}

var day = 2

switch(day) {
    case 1:
        console.log("Monday")
        break
    case 2:
        console.log("Tuesday")
        break
    default:
        console.log("Other day")
}

var user = "admin"

if (user === "admin") {
    console.log("Welcome Admin")
}

var n = 5
var fact = 1

for (var i = 1; i <= n; i++) {
    fact *= i
}

console.log(fact)

function reverseString(s) {
    var rev = ""
    for (var i = s.length - 1; i >= 0; i--) {
        rev += s[i]
    }
    return rev
}

console.log(reverseString("hello"))

var arr2 = [5,3,8,1]

for (var i = 0; i < arr2.length; i++) {
    for (var j = i + 1; j < arr2.length; j++) {
        if (arr2[i] > arr2[j]) {
            var temp = arr2[i]
            arr2[i] = arr2[j]
            arr2[j] = temp
        }
    }
}

console.log(arr2)

var num1 = 10

if (num1 > 0) {
    console.log("Positive")
} else if (num1 < 0) {
    console.log("Negative")
} else {
    console.log("Zero")
}

var vowels = "aeiou"
var ch = "a"

if (vowels.includes(ch)) {
    console.log("Vowel")
} else {
    console.log("Consonant")
}

var sum2 = 0

for (var i = 1; i <= 10; i++) {
    sum2 += i
}

console.log(sum2)
