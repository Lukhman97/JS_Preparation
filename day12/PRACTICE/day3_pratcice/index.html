    <script>
        function objecttoarray(obj){
            let result=[]
            for(let i in obj){
                if(obj.hasOwnProperty(i)){
                    result.push([i,obj[i]])

                }
            }
            return result
        }
       
        let person = {
    name: "Lukhman",
    age: 22,
    city: "Hyderabad"
};

console.log(objecttoarray(person));

        
        
    </script>
