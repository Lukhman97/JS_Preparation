<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cont{
            height: 670px;
            width: 400px;
            margin-top: 10px;
            margin-left: 300px;
            background-color: lightcyan;
            border: 5px solid antiquewhite;
        }
        img{
            width: 400px;
            height: 400px;
        }
        input{
            width: 70px;
            height: 70px;
            background-color: white;
            color:black;
            border-radius: 5px;
            font-size: 30px;
            padding-left: 15px;
            

        }
        .one{
            /* text-align: center; */
            margin-left: 30px;
            margin-top: 40px;
        }
        span{
            font-size: 30px;
            font-weight: bold;
        }
        button{
            width: 60px;
            height: 60px;
            background-color: blue;
            /* text-align: center; */
            color: white;
            margin-left: 70px;
            margin-top: 30px;
            border-radius: 10px;
        }
        .two{
            margin-left: 30px;
            margin-top: 10px;
            color: green;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="cont">
        <img src="./image.png" alt="math image">
        <div class="one">
            <input type="number" name="" id="num1">&nbsp;&nbsp;
            <span>+</span>&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="number" name="" id="num2">&nbsp;&nbsp;
            <span>=</span>&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="number" name="" id="num3">&nbsp;&nbsp;

        </div>
        <div class="button">
            <button onclick="checking()">Check</button>
            <button onclick="restart()">Restart</button>
        </div>
        <div class="two" id="two">Enter the number in blw 1 t0 200</div>

    </div>
    <script>
        // let num1=document.getElementById("num1").value 
        // let num2=document.getElementById("num2").value
        // let num3=document.getElementById("num3").value
        let two=document.getElementById("two")

        num11=Math.ceil(Math.random()*100)+1
        document.getElementById("num1").value=num11
        num12=Math.ceil(Math.random()*100)+1
        document.getElementById("num2").value=num12

        function checking(){
            let num3=Number(document.getElementById("num3").value)
           if ((num11+num12)===num3){
            two.innerHTML="You are correct!!!!!"
           }
           else if(num11+num12>=num3){
            two.innerHTML="You are to high!!!!"
            // two.innerHTML=`${num3},${num11+num12}`
           }
            else if(num11+num12<=num3){
            two.innerHTML="You are to low!!!!"
           }
           else if(num11+num12===null){
            two.innerHTML="Enter the Number fst"
           }
           else{
            two.innerHTML="Enter a valid number!!!!"
           }

        }
        function restart(){
            location.reload()
        }


    </script>
    
</body>
</html>
