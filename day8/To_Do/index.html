<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>

    <style>
        body{
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .block1{
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h2{
            text-align: center;
        }

        input{
            width: 70%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button{
            padding: 10px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        ul{
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li{
            background-color: #f1f1f1;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .delete{
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="block1">
    <h2>To-Do List</h2>

    <input type="text" id="main" placeholder="Enter task">
    <button onclick="add()">Add</button>

    <ul id="list"></ul>
</div>

<script>
    let list = document.getElementById("list")

    window.onload = function(){
        let data = JSON.parse(localStorage.getItem("tasks")) || []
        data.forEach(task => createTask(task))
    }

    function add(){
        let input = document.getElementById("main")
        let value = input.value

        if(value === "") return

        createTask(value)
        saveTask(value)

        input.value = ""
    }

    function createTask(text){
        let li = document.createElement("li")
        li.innerText = text

        let del = document.createElement("button")
        del.innerText = "X"
        del.className = "delete"

        del.onclick = function(){
            li.remove()
            removeTask(text)
        }

        li.appendChild(del)
        list.appendChild(li)
    }

    function saveTask(task){
        let data = JSON.parse(localStorage.getItem("tasks")) || []
        data.push(task)
        localStorage.setItem("tasks", JSON.stringify(data))
    }

    function removeTask(task){
        let data = JSON.parse(localStorage.getItem("tasks")) || []
        data = data.filter(t => t !== task)
        localStorage.setItem("tasks", JSON.stringify(data))
    }
</script>

</body>
</html>
